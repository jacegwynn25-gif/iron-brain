<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1240" viewBox="0 0 1800 1240" role="img" aria-label="Iron Brain logo exploration round 02">
  <defs>
    <symbol id="ib-lock" viewBox="0 0 128 128">
      <path d="M17 18h37l-6 16H39v60h12l-7 16H9l7-16h10V34H11l6-16Z" fill="currentColor"/>
      <path fill="currentColor" fill-rule="evenodd" d="M58 18h31c21 0 34 11 34 29 0 10-5 18-15 24 12 5 18 14 18 27 0 20-15 32-39 32H58V18Zm18 16v30h12c11 0 18-6 18-15 0-10-7-15-19-15H76Zm0 46v32h13c13 0 20-6 20-16s-7-16-21-16H76Z"/>
      <path d="M58 18h18v112H58V18Z" fill="currentColor"/>
      <path d="M39 34h16l-16 16V34Zm0 60h18l-18 16V94Z" fill="#050608"/>
    </symbol>

    <symbol id="ib-spine" viewBox="0 0 128 128">
      <path d="M26 17h27l-6 16h-8v62h12l-6 16H18l6-16h7V33H20l6-16Z" fill="currentColor"/>
      <path d="M60 18v92h30c22 0 35-11 35-29 0-13-7-23-20-27 10-5 15-13 15-23 0-17-12-27-33-27H60Zm18 16h8c11 0 17 5 17 14s-6 14-17 14h-8V34Zm0 43h10c13 0 20 6 20 16s-7 16-20 16H78V77Z" fill="currentColor" fill-rule="evenodd"/>
      <path d="M60 18h18v92H60V18Z" fill="currentColor"/>
      <path d="M17 17h38l-6 16H11l6-16Zm0 78h38l-6 16H11l6-16Z" fill="currentColor"/>
    </symbol>

    <symbol id="ib-plate" viewBox="0 0 128 128">
      <path d="M64 10c30 0 54 24 54 54s-24 54-54 54-54-24-54-54 24-54 54-54Zm0 15c-22 0-39 17-39 39s17 39 39 39 39-17 39-39-17-39-39-39Z" fill="currentColor"/>
      <path d="M22 52H8v24h14V52Zm98 0h-14v24h14V52Z" fill="currentColor"/>
      <path d="M54 31h20v66H54V31Z" fill="currentColor"/>
      <circle cx="64" cy="64" r="16" fill="#050608"/>
      <circle cx="64" cy="64" r="7" fill="currentColor"/>
    </symbol>

    <symbol id="ib-crown" viewBox="0 0 128 128">
      <path d="M12 31 34 107h18l12-38 13 38h18l21-76-21 13-10 37-13-48H56L43 81 33 44 12 31Z" fill="currentColor"/>
      <path d="M57 21h14v77H57V21Z" fill="currentColor"/>
      <circle cx="64" cy="16" r="8" fill="currentColor"/>
      <path d="M56 99h16l-8 18-8-18Z" fill="#050608"/>
