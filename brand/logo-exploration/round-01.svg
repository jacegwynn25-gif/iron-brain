      <path d="M63 30v72M63 34h23c16 0 25 8 25 20s-9 20-25 20H63M63 74h26c18 0 28 8 28 22 0 15-11 24-30 24H63" fill="none" stroke="currentColor" stroke-width="15" stroke-linecap="square" stroke-linejoin="miter"/>
    </symbol>

    <symbol id="mark-neural-bolt" viewBox="0 0 128 128">
