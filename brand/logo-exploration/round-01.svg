  <rect class="sheet" width="1800" height="1180"/>
  <text class="kicker" x="64" y="72">IRON BRAIN LOGO EXPLORATION / ROUND 01</text>
  <text class="title" x="64" y="126">MONOCHROME STRUCTURE FIRST</text>
  <text class="copy" x="64" y="164">No gradients. No literal brain cartoons. No production swap. Pick a direction, then refine the strongest structure.</text>

