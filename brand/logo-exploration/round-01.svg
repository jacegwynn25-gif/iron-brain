      .title { fill: #f4f0e6; font-family: Inter, Arial, sans-serif; font-size: 44px; font-weight: 950; font-style: italic; letter-spacing: -0.02em; }
      .kicker { fill: #a6adba; font-family: Inter, Arial, sans-serif; font-size: 15px; font-weight: 850; letter-spacing: 0.2em; }
      .panel { fill: #0b0e13; stroke: #272e38; stroke-width: 1.5; }
      .tile { fill: #050608; stroke: #242a34; stroke-width: 1.5; }
      .label { fill: #f4f0e6; font-family: Inter, Arial, sans-serif; font-size: 22px; font-weight: 950; font-style: italic; letter-spacing: -0.01em; }
      .meta { fill: #8f98a8; font-family: Inter, Arial, sans-serif; font-size: 12px; font-weight: 800; letter-spacing: 0.15em; }
      .copy { fill: #b7bdc8; font-family: Inter, Arial, sans-serif; font-size: 15px; font-weight: 650; }
      .tiny { fill: #8f98a8; font-family: Inter, Arial, sans-serif; font-size: 11px; font-weight: 800; letter-spacing: 0.12em; }
