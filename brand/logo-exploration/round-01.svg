    <text class="copy" x="30" y="126">Plate-cut monogram. Built for</text>
    <text class="copy" x="30" y="148">equipment-brand toughness.</text>
    <rect class="tile" x="40" y="190" width="240" height="240" rx="42"/>
    <use href="#mark-forge-ib" x="84" y="234" width="152" height="152" color="#f4f0e6"/>
