  <text class="copy" x="64" y="1094">Read test: the 16px preview matters. If the mark collapses there, it is not app-icon ready.</text>
  <text class="copy" x="64" y="1124">Next step: pick one direction or kill all five. Then refine proportions in SVG before color or app-icon treatment.</text>
