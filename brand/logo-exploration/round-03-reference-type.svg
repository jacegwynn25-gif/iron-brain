<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1260" viewBox="0 0 1800 1260" role="img" aria-label="Iron Brain logo exploration round 03">
  <defs>
    <linearGradient id="steel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f6f5ee"/>
      <stop offset="0.18" stop-color="#a9adb0"/>
      <stop offset="0.45" stop-color="#54595f"/>
      <stop offset="0.72" stop-color="#d9dad6"/>
      <stop offset="1" stop-color="#3b3f45"/>
    </linearGradient>
    <linearGradient id="darkSteel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#383d44"/>
      <stop offset="0.46" stop-color="#15181d"/>
      <stop offset="1" stop-color="#050608"/>
    </linearGradient>
    <radialGradient id="tile" cx="50%" cy="32%" r="80%">
      <stop offset="0" stop-color="#161a21"/>
      <stop offset="0.58" stop-color="#080a0e"/>
      <stop offset="1" stop-color="#030405"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="tightShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#000000" flood-opacity="0.42"/>
    </filter>

    <symbol id="steel-plate-mark" viewBox="0 0 760 340">
      <g filter="url(#softShadow)">
        <circle cx="380" cy="170" r="132" fill="url(#darkSteel)" stroke="url(#steel)" stroke-width="22"/>
        <circle cx="380" cy="170" r="82" fill="#171a1f" stroke="#8d9090" stroke-width="13"/>
        <circle cx="380" cy="170" r="37" fill="#111318" stroke="url(#steel)" stroke-width="12"/>
        <path d="M299 77c-31 21-54 53-63 91M461 77c31 21 54 53 63 91M299 263c-31-21-54-53-63-91M461 263c31-21 54-53 63-91" fill="none" stroke="#a9aba8" stroke-width="12" stroke-linecap="round" opacity="0.84"/>
        <path d="M341 66h78M341 274h78" fill="none" stroke="#d2d2cd" stroke-width="22" stroke-linecap="round"/>
        <rect x="110" y="151" width="540" height="38" rx="9" fill="url(#steel)"/>
        <rect x="112" y="163" width="536" height="8" fill="#f6f5ee" opacity="0.45"/>
        <g fill="url(#steel)">
          <rect x="50" y="127" width="34" height="86" rx="11"/>
          <rect x="90" y="108" width="42" height="124" rx="12"/>
          <rect x="138" y="85" width="34" height="170" rx="12"/>
          <rect x="676" y="127" width="34" height="86" rx="11"/>
          <rect x="628" y="108" width="42" height="124" rx="12"/>
          <rect x="588" y="85" width="34" height="170" rx="12"/>
        </g>
      </g>
    </symbol>

    <symbol id="steel-plate-icon" viewBox="0 0 512 512">
      <rect width="512" height="512" rx="112" fill="#050608"/>
      <rect x="30" y="30" width="452" height="452" rx="100" fill="url(#tile)" stroke="#2a313b" stroke-width="14"/>
      <g filter="url(#tightShadow)">
        <circle cx="256" cy="256" r="116" fill="#11141a" stroke="url(#steel)" stroke-width="31"/>
        <circle cx="256" cy="256" r="65" fill="#101318" stroke="#aeb0ac" stroke-width="18"/>
        <circle cx="256" cy="256" r="25" fill="#0b0d11" stroke="#f2f1e8" stroke-width="10"/>
        <rect x="87" y="238" width="338" height="36" rx="9" fill="url(#steel)"/>
        <rect x="92" y="249" width="328" height="7" fill="#f7f5ec" opacity="0.45"/>
        <rect x="48" y="221" width="34" height="70" rx="10" fill="url(#steel)"/>
        <rect x="427" y="221" width="34" height="70" rx="10" fill="url(#steel)"/>
        <rect x="123" y="204" width="24" height="104" rx="9" fill="url(#steel)"/>
        <rect x="365" y="204" width="24" height="104" rx="9" fill="url(#steel)"/>
      </g>
    </symbol>

    <style>
      .sheet { fill: #050608; }
      .panel { fill: #0b0e13; stroke: #2a313c; stroke-width: 1.5; }
      .tileBox { fill: #050608; stroke: #252c36; stroke-width: 1.5; }
      .kicker { fill: #a6adba; font-family: Inter, Arial, sans-serif; font-size: 15px; font-weight: 850; letter-spacing: 0.2em; }
      .title { fill: #f4f0e6; font-family: Inter, Arial, sans-serif; font-size: 43px; font-weight: 950; font-style: italic; letter-spacing: -0.02em; }
      .copy { fill: #b7bdc8; font-family: Inter, Arial, sans-serif; font-size: 16px; font-weight: 650; }
      .label { fill: #f4f0e6; font-family: Inter, Arial, sans-serif; font-size: 26px; font-weight: 950; font-style: italic; letter-spacing: -0.015em; }
      .meta { fill: #8f98a8; font-family: Inter, Arial, sans-serif; font-size: 12px; font-weight: 850; letter-spacing: 0.16em; }
      .appName { fill: #f4f0e6; font-family: Inter, Arial, sans-serif; font-size: 96px; font-weight: 950; font-style: italic; letter-spacing: -0.04em; }
      .appNameSmall { fill: #f4f0e6; font-family: Inter, Arial, sans-serif; font-size: 44px; font-weight: 950; font-style: italic; letter-spacing: -0.035em; }
      .ib { fill: #f4f0e6; font-family: Inter, Arial, sans-serif; font-size: 178px; font-weight: 950; font-style: italic; letter-spacing: -0.08em; }
      .ibSmall { fill: #f4f0e6; font-family: Inter, Arial, sans-serif; font-size: 70px; font-weight: 950; font-style: italic; letter-spacing: -0.08em; }
    </style>
  </defs>

  <rect class="sheet" width="1800" height="1260"/>
  <text class="kicker" x="64" y="70">IRON BRAIN LOGO EXPLORATION / ROUND 03</text>
  <text class="title" x="64" y="124">REFERENCE-BASED MARK + APP-FONT TYPE OPTIONS</text>
  <text class="copy" x="64" y="164">Based on your steel plate/barbell reference. No production icon files changed. App font target: Inter Black Italic, the same style used by main headings.</text>

  <g transform="translate(64 226)">
    <rect class="panel" width="520" height="810" rx="30"/>
    <text class="meta" x="34" y="54">OPTION A</text>
    <text class="label" x="34" y="94">STEEL PLATE EMBLEM</text>
    <text class="copy" x="34" y="132">Closest to the reference. Best as a logo/banner,</text>
    <text class="copy" x="34" y="154">not necessarily the cleanest tiny app icon.</text>
    <rect class="tileBox" x="34" y="204" width="452" height="258" rx="34"/>
    <use href="#steel-plate-mark" x="68" y="246" width="384" height="172"/>
    <text class="meta" x="34" y="526">APP ICON CROP</text>
    <use href="#steel-plate-icon" x="138" y="560" width="244" height="244"/>
  </g>

  <g transform="translate(640 226)">
    <rect class="panel" width="520" height="810" rx="30"/>
    <text class="meta" x="34" y="54">OPTION B</text>
    <text class="label" x="34" y="94">APP-FONT INITIALS</text>
    <text class="copy" x="34" y="132">Use the app's own heading language: simple,</text>
    <text class="copy" x="34" y="154">bold, italic, uppercase. Less logo-y, more honest.</text>
    <rect class="tileBox" x="34" y="204" width="452" height="258" rx="34"/>
    <text class="ib" x="156" y="392">IB</text>
    <rect x="130" y="402" width="250" height="10" fill="#f4f0e6"/>
    <text class="meta" x="34" y="526">APP ICON CROP</text>
    <rect x="138" y="560" width="244" height="244" rx="54" fill="#050608" stroke="#2a313b" stroke-width="7"/>
    <text class="ibSmall" x="202" y="707">IB</text>
    <rect x="192" y="716" width="126" height="6" fill="#f4f0e6"/>
  </g>

  <g transform="translate(1216 226)">
    <rect class="panel" width="520" height="810" rx="30"/>
    <text class="meta" x="34" y="54">OPTION C</text>
    <text class="label" x="34" y="94">APP-FONT NAME</text>
    <text class="copy" x="34" y="132">No symbol. Just the brand in the exact visual</text>
    <text class="copy" x="34" y="154">language the app already uses.</text>
    <rect class="tileBox" x="34" y="204" width="452" height="258" rx="34"/>
    <text class="appName" x="60" y="330">IRON</text>
    <text class="appName" x="60" y="420">BRAIN</text>
    <text class="meta" x="34" y="526">APP ICON CROP</text>
    <rect x="138" y="560" width="244" height="244" rx="54" fill="#050608" stroke="#2a313b" stroke-width="7"/>
    <text class="appNameSmall" x="171" y="654">IRON</text>
    <text class="appNameSmall" x="169" y="704">BRAIN</text>
  </g>

  <g transform="translate(64 1080)">
    <text class="copy" x="0" y="0">Decision framing: A follows your reference. B/C follow the actual app typography. If none of these feel right, we keep current icon and commission/reference a real designer-style mark later.</text>
    <text class="copy" x="0" y="36">My practical recommendation from this sheet: A for brand/logo banner, B for the PWA icon if you want the cleanest app-home-screen read.</text>
  </g>
</svg>
